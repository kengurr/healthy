name: Docker Publish (Release)

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - 'release/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string

env:
  JAVA_VERSION: '21'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # =============================================================================
  # Validate release
  # =============================================================================
  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate tag format
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_VERSION=${GITHUB_REF#refs/tags/v}
            if [[ ! $TAG_VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid tag format. Expected: v1.0.0"
              exit 1
            fi
            echo "RELEASE_VERSION=$TAG_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Set release version
        id: version
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            echo "RELEASE_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

  # =============================================================================
  # Build and package
  # =============================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: validate-release
    outputs:
      version: ${{ steps.version.outputs.RELEASE_VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-repo-${{ runner.os }}-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            maven-repo-${{ runner.os }}-

      - name: Set release version
        id: version
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            echo "RELEASE_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Update project version
        working-directory: ./backend
        run: |
          ./mvnw versions:set \
            -DnewVersion=${{ steps.version.outputs.RELEASE_VERSION }} \
            -DgenerateBackup=false \
            -B

      - name: Build application
        working-directory: ./backend
        run: ./mvnw package -DskipTests -B

      - name: Run tests
        working-directory: ./backend
        env:
          SPRING_PROFILES_ACTIVE: test
        run: ./mvnw test -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: zdravdom-jar-release
          path: backend/target/*.jar
          retention-days: 30

  # =============================================================================
  # Build and push Docker images
  # =============================================================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: zdravdom-jar-release
          path: backend/target/

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            echo "RELEASE_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ secrets.DOCKER_HUB_REPO }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{ is_default_branch }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: secrets.DOCKER_HUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push to GitHub Container Registry
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.RELEASE_VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            com.zdravdom.version=${{ steps.version.outputs.RELEASE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push to Docker Hub / ECR
        if: secrets.DOCKER_HUB_REPO != ''
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          registries: ${{ secrets.DOCKER_HUB_REPO }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =============================================================================
  # Create GitHub Release
  # =============================================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: zdravdom-jar-release
          path: backend/target/

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            echo "RELEASE_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        run: |
          CHANGELOG_FILE="CHANGELOG.md"
          cat > $CHANGELOG_FILE << 'EOF'
          # Changelog

          ## ${{ steps.version.outputs.RELEASE_VERSION }}

          ### Changes
          - Docker images published

          EOF

          git log --oneline -20 >> $CHANGELOG_FILE

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.RELEASE_VERSION }}
          name: Release v${{ steps.version.outputs.RELEASE_VERSION }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.RELEASE_VERSION, 'alpha') || contains(steps.version.outputs.RELEASE_VERSION, 'beta') || contains(steps.version.outputs.RELEASE_VERSION, 'rc') }}
          generate_release_notes: true
          body_path: CHANGELOG.md
          attachments: |
            backend/target/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =============================================================================
  # Notify release
  # =============================================================================
  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: release
    if: always()
    steps:
      - name: Notify Slack
        if: secrets.SLACK_WEBHOOK != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Zdravdom Release ${{ needs.release.outputs.VERSION }} Deployed",
              "attachments": [{
                "color": "success",
                "fields": [
                  {"title": "Version", "value": "${{ needs.release.outputs.VERSION }}"},
                  {"title": "Repository", "value": "${{ github.repository }}"},
                  {"title": "Release URL", "value": "${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ needs.release.outputs.VERSION }}"}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}