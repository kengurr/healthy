name: Secrets Detection

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  secrets-scan:
    name: Detect Secrets in Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect secrets with TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base64: true
          binary: false
          custom-regexes: |
            # AWS keys
            AKIA[0-9A-Z]{16}
            # Stripe keys
            sk_(live|test)_[0-9a-zA-Z]{24,}
            # JWT secrets (heuristic)
            JWT_SECRET=[A-Za-z0-9+/=]{32,}
            # Generic API keys
            API_KEY=[A-Za-z0-9+/=]{20,}
            # Private keys
            -----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----
          fork: false
         饱和度: high

      - name: Scan for common secret patterns with gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          scan-config-opts: |
            [rules]
              description = "AWS Access Key ID"
              pattern = "AKIA[0-9A-Z]{16}"

              description = "Stripe Secret Key"
              pattern = "sk_(live|test)_[0-9a-zA-Z]{24,}"

              description = "JWT Secret"
              pattern = "JWT_SECRET=[A-Za-z0-9+/=]{32,}"

              description = "Twilio Account SID"
              pattern = "AC[a-z0-9]{32}"

              description = "SendGrid API Key"
              pattern = "SG\\.[a-z0-9_-]{22}\\.[a-z0-9_-]{43}"

              description = "Private Key Block"
              pattern = "-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----"

              description = "Generic API Key"
              pattern = "(?i)(api[_-]?key|apikey)\\s*[=:]/\\s*[\"']?[A-Za-z0-9+/=]{20,}[\"']?"

              description = "Generic Secret"
              pattern = "(?i)(secret|password|passwd|token)\\s*[=:]/\\s*[\"']?[A-Za-z0-9+/=]{16,}[\"']?"

      - name: Check for committed .env files
        run: |
          if git log --all --oneline --name-only | grep -E "\.env$|\.env\.|\.env-local$|\.env\.staging$|\.env\.prod$" | grep -v "\.env\.example$" | grep -v "^\\.env\.example$"; then
            echo "ERROR: .env files have been committed to the repository!"
            echo "Remove secrets from git history:"
            echo "  git filter-branch --force --index-filter 'git rm --cached --ignore-unmatch <file>' --prune-empty --tag-name-filter cat -- --all"
            echo "Or use GitHub's secret scanning beta removal:"
            echo "  https://github.com/settings/security-log"
            exit 1
          fi

      - name: Verify no hardcoded secrets in Java files
        run: |
          # Check for common hardcoded secret patterns in Java source
          FOUND=$(grep -rEn "(password\s*=\s*[\"'][^\"']{8,}[\"']|secret\s*=\s*[\"'][^\"']{8,}[\"']|apiKey\s*=\s*[\"'][A-Za-z0-9+/=]{20,}[\"'])" \
            --include="*.java" \
            --exclude-dir=target \
            --exclude-dir=.git \
            . || true)
          if [ -n "$FOUND" ]; then
            echo "ERROR: Potential hardcoded secrets found:"
            echo "$FOUND"
            exit 1
          fi

      - name: Verify no hardcoded secrets in TypeScript files
        run: |
          FOUND=$(grep -rEn "(password\s*[:=]\s*['\"][^'\"]{8,}['\"]|secret\s*[:=]\s*['\"][^'\"]{8,}['\"]|apiKey\s*[:=]\s*['\"][A-Za-z0-9+/=]{20,}['\"])" \
            --include="*.ts" \
            --include="*.tsx" \
            --exclude-dir=node_modules \
            --exclude-dir=target \
            --exclude-dir=.git \
            . || true)
          if [ -n "$FOUND" ]; then
            echo "ERROR: Potential hardcoded secrets found:"
            echo "$FOUND"
            exit 1
          fi

      - name: Fail on critical findings
        if: failure()
        run: |
          echo "SECRETS DETECTION FAILED"
          echo "Secrets may have been committed to the repository."
          echo "This is a CRITICAL security issue."
          echo "Review the steps above and remove secrets from git history."
          exit 1
