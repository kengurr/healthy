spring:
  config:
    activate:
      on-profile: production

  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:}:${DATABASE_PORT:5432}/${DATABASE_NAME:zdravdom}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
        statements:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: false
    validate-on-migrate: true
    connect-retries: 3
    connect-retries-interval: 5

  data:
    redis:
      host: ${REDIS_HOST:}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 32
          max-idle: 16
          min-idle: 8
          max-wait: 2000ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:}
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
    producer:
      acks: all
      retries: 3

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

# Production AWS S3
aws:
  s3:
    endpoint: ${AWS_S3_ENDPOINT:}
    region: ${AWS_REGION:eu-central-1}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
    bucket:
      documents: ${AWS_S3_BUCKET_DOCUMENTS:zdravdom-documents-prod}
      reports: ${AWS_S3_BUCKET_REPORTS:zdravdom-reports-prod}
      media: ${AWS_S3_BUCKET_MEDIA:zdravdom-media-prod}

# JWT Configuration - MUST be set via environment
app:
  jwt:
    secret: ${JWT_SECRET:}  # REQUIRED: 256-bit secret
    access-token-expiry: 900000        # 15 minutes
    refresh-token-expiry: 864000000     # 10 days in production

# Production logging
logging:
  level:
    root: WARN
    com.zdravdom: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/zdravdom/application.log
    max-size: 100MB
    max-history: 30

# Production server
server:
  port: ${APP_PORT:8080}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# Production actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
    redis:
      enabled: true

# Production Resilience4j - Strict settings
resilience4j:
  circuitbreaker:
    instances:
      stripe:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60000
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: COUNT_BASED
        minimum-number-of-calls: 10
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - com.stripe.exception.ApiConnectionException
        ignore-exceptions:
          - com.stripe.exception.AuthenticationException
      nijz:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30000
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: COUNT_BASED
        minimum-number-of-calls: 5
      zzzs:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30000
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: COUNT_BASED
        minimum-number-of-calls: 5
  retry:
    instances:
      default:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
        ignore-exceptions:
          - java.lang.IllegalArgumentException
          - com.zdravdom.global.exception.GlobalExceptionHandler$ValidationException
  timelimiter:
    instances:
      default:
        timeout-duration: 5s
        cancel-running-future: true
