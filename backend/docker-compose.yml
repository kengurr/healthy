version: '3.8'

# Zdravdom Local Development Stack
# Full service dependencies for local development (PostgreSQL, Redis, Kafka, S3)
#
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose up -d backend      # Start only backend
#   docker-compose down -v            # Stop and remove volumes
#
# Services exposed:
#   backend:     http://localhost:8080/api/v1
#   postgres:    localhost:5432
#   redis:       localhost:6379
#   kafka:       localhost:9092
#   zookeeper:   localhost:2181
#   localstack:  http://localhost:4566 (S3 mock)
#   kafka-ui:    http://localhost:8085 (Kafka UI)
#   prometheus:  http://localhost:9090 (Metrics)
#   grafana:     http://localhost:3000 (Dashboards)

services:
  # ===========================================================================
  # DATA STORES
  # ===========================================================================

  postgres:
    image: postgres:16-alpine
    container_name: zdravdom-postgres
    environment:
      POSTGRES_DB: zdravdom
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Flyway migrations mounted read-only
      - ./src/main/resources/db/migration:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zdravdom"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - zdravdom
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: zdravdom-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zdravdom
    restart: unless-stopped

  # ===========================================================================
  # KAFKA (Event Streaming)
  # ===========================================================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zdravdom-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - zdravdom
    restart: unless-stopped

  kafka:
    image: bitnami/kafka:3.6
    container_name: zdravdom-kafka
    ports:
      - "9092:9092"
    environment:
      # Listeners - internal (Kafka) and external (Kafka UI)
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_NAME_CONTROLLER_LISTENER_NAME: CONTROLLER
      KAFKA_CFG_LISTENER_NAME_CONTROLLER_LISTENER_NAME: CONTROLLER
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@zookeeper:2181
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 3
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_CFG_MIN_INSYNC_REPLICAS: 1
      # Resource limits
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    volumes:
      - kafka_data:/bitnami/kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - zdravdom
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: zdravdom-kafka-ui
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka
      - zookeeper
    networks:
      - zdravdom
    restart: unless-stopped

  # ===========================================================================
  # AWS S3 MOCK (LocalStack)
  # ===========================================================================

  localstack:
    image: localstack/localstack:3.0
    container_name: zdravdom-localstack
    ports:
      - "4566:4566"  # Main endpoint
      - "4572:4572"  # S3 service
    environment:
      SERVICES: s3
      DEBUG: "1"
      PERSISTENCE: "1"
      DATA_DIR: /var/lib/localstack/data
      AWS_DEFAULT_REGION: eu-central-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - zdravdom
    restart: unless-stopped

  # ===========================================================================
  # MONITORING (Prometheus + Grafana)
  # ===========================================================================

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: zdravdom-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - zdravdom
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    container_name: zdravdom-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ALERTING_ENABLED: "true"
      GF_UNIFIED_ALERTING_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - zdravdom
    restart: unless-stopped

  # ===========================================================================
  # SPRING BOOT BACKEND
  # ===========================================================================

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zdravdom-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      localstack:
        condition: service_healthy
    environment:
      # Spring Profile
      SPRING_PROFILES_ACTIVE: local
      # Database
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: zdravdom
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # JWT
      JWT_SECRET: dev-secret-key-change-in-production-min-256-bits-long-enough-for-hs256
      # AWS S3 (LocalStack)
      AWS_REGION: eu-central-1
      AWS_S3_ENDPOINT: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_S3_BUCKET_DOCUMENTS: zdravdom-documents
      AWS_S3_BUCKET_REPORTS: zdravdom-reports
      AWS_S3_BUCKET_MEDIA: zdravdom-media
      # Sentry
      SENTRY_DSN:
      SENTRY_ENVIRONMENT: local
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-standalone -qO- http://localhost:8080/api/v1/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - zdravdom
    restart: unless-stopped

# =============================================================================
# NETWORKS
# =============================================================================

networks:
  zdravdom:
    driver: bridge
    name: zdravdom-network

# =============================================================================
# VOLUMES (Persistence)
# =============================================================================

volumes:
  postgres_data:
    name: zdravdom-postgres-data
  redis_data:
    name: zdravdom-redis-data
  kafka_data:
    name: zdravdom-kafka-data
  zookeeper_data:
    name: zdravdom-zookeeper-data
  localstack_data:
    name: zdravdom-localstack-data
  prometheus_data:
    name: zdravdom-prometheus-data
  grafana_data:
    name: zdravdom-grafana-data
