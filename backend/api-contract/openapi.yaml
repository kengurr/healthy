openapi: 3.0.3
info:
  title: Zdravdom API
  description: Home healthcare platform API
  version: 1.0.0
  contact:
    name: Zdravdom Development Team

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ─── Enums ───────────────────────────────────────────────────────────────

    Role:
      type: string
      enum: [PATIENT, PROVIDER, OPERATOR, ADMIN, SUPERADMIN]

    ProviderStatus:
      type: string
      enum: [PENDING_VERIFICATION, VERIFIED, ACTIVE, REJECTED, SUSPENDED, INACTIVE]

    BookingStatus:
      type: string
      enum: [REQUESTED, CONFIRMED, IN_PROGRESS, COMPLETED, CANCELLED]

    PaymentStatus:
      type: string
      enum: [PENDING, PAID, REFUNDED, FAILED]

    VisitStatus:
      type: string
      enum: [SCHEDULED, IN_PROGRESS, COMPLETED, CANCELLED]

    UrgencyType:
      type: string
      enum: [MEDICAL_EMERGENCY, SUSPECTED_ABUSE, MEDICATION_ERROR, PATIENT_DECLINING, OTHER]

    Platform:
      type: string
      enum: [IOS, ANDROID]

    ServiceCategory:
      type: string
      enum: [NURSING, THERAPY, LABORATORY, SPECIALIST]

    DayOfWeek:
      type: string
      enum: [MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, SATURDAY, SUNDAY]

    # ─── Shared ───────────────────────────────────────────────────────────────

    Pagination:
      type: object
      properties:
        page:
          type: integer
          minimum: 0
          default: 0
        size:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        total:
          type: integer
          description: Total number of elements
        totalPages:
          type: integer

    Error:
      type: object
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Invalid request data
        field:
          type: string
          example: email
        timestamp:
          type: string
          format: date-time

    Address:
      type: object
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
          example: Home
        street:
          type: string
        city:
          type: string
        postalCode:
          type: string
        country:
          type: string
          default: Slovenia
        gpsLat:
          type: number
          format: double
        gpsLng:
          type: number
          format: double
        isDefault:
          type: boolean

    EmergencyContact:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        relation:
          type: string

    InsuranceDetails:
      type: object
      properties:
        provider:
          type: string
        policyNumber:
          type: string

    GPSLocation:
      type: object
      properties:
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double

    Vitals:
      type: object
      properties:
        bloodPressure:
          type: string
          example: "120/80"
        heartRate:
          type: integer
          example: 72
        temperature:
          type: number
          format: float
          example: 36.6
        o2Saturation:
          type: integer
          example: 98

    # ─── Auth ──────────────────────────────────────────────────────────────────

    RegisterRequest:
      type: object
      required:
        - email
        - phone
        - password
        - firstName
        - lastName
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
        password:
          type: string
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string
        dateOfBirth:
          type: string
          format: date

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT access token (15 min expiry)
        refreshToken:
          type: string
          description: JWT refresh token (7 days expiry)
        expiresIn:
          type: integer
          example: 900

    ProviderRegisterRequest:
      type: object
      required:
        - email
        - phone
        - password
        - role
        - profession
        - firstName
        - lastName
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
        password:
          type: string
          minLength: 8
        role:
          $ref: '#/components/schemas/Role'
        profession:
          type: string
          example: Nurse
        firstName:
          type: string
        lastName:
          type: string

    # ─── Patient ───────────────────────────────────────────────────────────────

    Patient:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        dateOfBirth:
          type: string
          format: date
        gender:
          type: string
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/Address'
        insuranceDetails:
          $ref: '#/components/schemas/InsuranceDetails'
        allergies:
          type: array
          items:
            type: string
        chronicConditions:
          type: array
          items:
            type: string
        emergencyContact:
          $ref: '#/components/schemas/EmergencyContact'

    UpdatePatientRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        insuranceDetails:
          $ref: '#/components/schemas/InsuranceDetails'
        allergies:
          type: array
          items:
            type: string
        chronicConditions:
          type: array
          items:
            type: string
        emergencyContact:
          $ref: '#/components/schemas/EmergencyContact'

    AddAddressRequest:
      type: object
      required:
        - label
        - street
        - city
        - postalCode
      properties:
        label:
          type: string
        street:
          type: string
        city:
          type: string
        postalCode:
          type: string
        country:
          type: string
          default: Slovenia
        gpsLat:
          type: number
          format: double
        gpsLng:
          type: number
          format: double
        isDefault:
          type: boolean
          default: false

    DocumentUploadRequest:
      type: object
      required:
        - type
        - description
      properties:
        type:
          type: string
          example: MEDICAL_RECORD
        description:
          type: string

    GDPRExportResponse:
      type: object
      properties:
        jobId:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, PROCESSING, COMPLETED, FAILED]
        downloadUrl:
          type: string
          description: Presigned S3 URL when completed

    # ─── Service / Catalog ─────────────────────────────────────────────────────

    Service:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Home Nursing Care
        category:
          $ref: '#/components/schemas/ServiceCategory'
        description:
          type: string
        duration:
          type: integer
          description: Estimated duration in minutes
          example: 60
        price:
          type: number
          format: float
          example: 45.00
        currency:
          type: string
          default: EUR
        rating:
          type: number
          format: float
        reviewsCount:
          type: integer
        imageUrl:
          type: string
        includedItems:
          type: array
          items:
            type: string

    ServicePackage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        serviceId:
          type: string
          format: uuid
        name:
          type: string
          example: S
        description:
          type: string
        price:
          type: number
          format: float
        duration:
          type: integer
          description: Duration in minutes

    ProviderSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
        profession:
          type: string
        specialty:
          type: string
        rating:
          type: number
          format: float
        reviewsCount:
          type: integer
        distance:
          type: number
          description: Distance in km
        languages:
          type: array
          items:
            type: string
        experience:
          type: integer
          description: Years of experience
        bio:
          type: string
        photoUrl:
          type: string
        status:
          $ref: '#/components/schemas/ProviderStatus'

    # ─── Availability ─────────────────────────────────────────────────────────

    WeeklyScheduleItem:
      type: object
      required:
        - day
        - startTime
        - endTime
      properties:
        day:
          $ref: '#/components/schemas/DayOfWeek'
        startTime:
          type: string
          example: "09:00"
        endTime:
          type: string
          example: "17:00"

    ProviderAvailability:
      type: object
      properties:
        weeklySchedule:
          type: array
          items:
            $ref: '#/components/schemas/WeeklyScheduleItem'
        blockedDates:
          type: array
          items:
            type: string
            format: date

    UpdateAvailabilityRequest:
      type: object
      properties:
        weeklySchedule:
          type: array
          items:
            $ref: '#/components/schemas/WeeklyScheduleItem'
        blockedDates:
          type: array
          items:
            type: string
            format: date

    TimeSlot:
      type: object
      properties:
        time:
          type: string
          example: "09:00"
        endTime:
          type: string
          example: "10:00"
        available:
          type: boolean

    SlotQuery:
      type: object
      required:
        - serviceId
        - date
        - addressId
      properties:
        serviceId:
          type: string
          format: uuid
        date:
          type: string
          format: date
        addressId:
          type: string
          format: uuid

    # ─── Booking ───────────────────────────────────────────────────────────────

    CreateBookingRequest:
      type: object
      required:
        - serviceId
        - addressId
        - date
        - timeSlot
      properties:
        serviceId:
          type: string
          format: uuid
        packageId:
          type: string
          format: uuid
        addressId:
          type: string
          format: uuid
        date:
          type: string
          format: date
        timeSlot:
          type: string
          example: "09:00"
        providerId:
          type: string
          format: uuid
          description: Optional preferred provider
        notes:
          type: string

    Booking:
      type: object
      properties:
        id:
          type: string
          format: uuid
        patientId:
          type: string
          format: uuid
        providerId:
          type: string
          format: uuid
        serviceId:
          type: string
          format: uuid
        packageId:
          type: string
          format: uuid
        addressId:
          type: string
          format: uuid
        date:
          type: string
          format: date
        timeSlot:
          type: string
          example: "09:00"
        status:
          $ref: '#/components/schemas/BookingStatus'
        paymentAmount:
          type: number
          format: float
        paymentStatus:
          $ref: '#/components/schemas/PaymentStatus'
        createdAt:
          type: string
          format: date-time
        statusTimeline:
          type: array
          items:
            $ref: '#/components/schemas/StatusTimelineItem'

    StatusTimelineItem:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/BookingStatus'
        timestamp:
          type: string
          format: date-time
        note:
          type: string

    BookingInbox:
      type: object
      properties:
        id:
          type: string
          format: uuid
        patientId:
          type: string
          format: uuid
        patientFirstName:
          type: string
        patientLastName:
          type: string
        serviceName:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        date:
          type: string
          format: date
        timeSlot:
          type: string
        status:
          $ref: '#/components/schemas/BookingStatus'

    CancelBookingRequest:
      type: object
      properties:
        reason:
          type: string

    RejectBookingRequest:
      type: object
      properties:
        reason:
          type: string

    BookingListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Booking'
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    # ─── Visit ──────────────────────────────────────────────────────────────────

    CompleteVisitRequest:
      type: object
      required:
        - vitals
        - clinicalNotes
      properties:
        vitals:
          $ref: '#/components/schemas/Vitals'
        clinicalNotes:
          type: string
        proceduresPerformed:
          type: array
          items:
            type: string
        photos:
          type: array
          items:
            type: string
            format: uri
        recommendations:
          type: string
        patientSignature:
          type: string
          description: Base64-encoded PNG signature

    Visit:
      type: object
      properties:
        id:
          type: string
          format: uuid
        bookingId:
          type: string
          format: uuid
        providerId:
          type: string
          format: uuid
        patientId:
          type: string
          format: uuid
        vitals:
          $ref: '#/components/schemas/Vitals'
        clinicalNotes:
          type: string
        proceduresPerformed:
          type: array
          items:
            type: string
        photos:
          type: array
          items:
            type: string
            format: uri
        recommendations:
          type: string
        patientSignature:
          type: string
        status:
          $ref: '#/components/schemas/VisitStatus'
        reportUrl:
          type: string
          format: uri

    EscalationRequest:
      type: object
      required:
        - urgencyType
        - notes
      properties:
        urgencyType:
          $ref: '#/components/schemas/UrgencyType'
        notes:
          type: string
        gpsLocation:
          $ref: '#/components/schemas/GPSLocation'

    Escalation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        visitId:
          type: string
          format: uuid
        urgencyType:
          $ref: '#/components/schemas/UrgencyType'
        notes:
          type: string
        gpsLocation:
          $ref: '#/components/schemas/GPSLocation'
        timestamp:
          type: string
          format: date-time
        notifiedUsers:
          type: array
          items:
            type: string

    # ─── Payments ───────────────────────────────────────────────────────────────

    CreatePaymentIntentRequest:
      type: object
      required:
        - bookingId
      properties:
        bookingId:
          type: string
          format: uuid
        allowedNetworks:
          type: array
          items:
            type: string
            enum: [visa, mastercard, amex, unionpay]
          description: Card networks to accept. Omit to allow all networks (Visa, MC, Amex by default).

    PaymentIntentResponse:
      type: object
      properties:
        clientSecret:
          type: string
        paymentIntentId:
          type: string

    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        bookingId:
          type: string
          format: uuid
        amount:
          type: number
          format: float
        currency:
          type: string
          default: EUR
        status:
          $ref: '#/components/schemas/PaymentStatus'
        stripePaymentIntentId:
          type: string
        createdAt:
          type: string
          format: date-time

    RefundRequest:
      type: object
      required:
        - bookingId
        - amount
      properties:
        bookingId:
          type: string
          format: uuid
        amount:
          type: number
          format: float
        reason:
          type: string

    # ─── Notifications ──────────────────────────────────────────────────────────

    RegisterPushTokenRequest:
      type: object
      required:
        - token
        - platform
      properties:
        token:
          type: string
        platform:
          $ref: '#/components/schemas/Platform'

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
        data:
          type: object
          additionalProperties: true
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time

    # ─── Ratings ───────────────────────────────────────────────────────────────

    CreateRatingRequest:
      type: object
      required:
        - rating
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        review:
          type: string

    # ─── Admin ───────────────────────────────────────────────────────────────────

    ProviderProfession:
      type: string
      enum: [NURSE, PHYSIOTHERAPIST, DOCTOR, CAREGIVER, SOCIAL_WORKER]

    ProviderSpecialty:
      type: string
      enum: [GENERAL_CARE, WOUND_CARE, POST_SURGERY_CARE, ELDERLY_CARE, PEDIATRIC_CARE, CHRONIC_DISEASE_MANAGEMENT, REHABILITATION, PALLIATIVE_CARE, MENTAL_HEALTH]

    EscalationStatus:
      type: string
      enum: [OPEN, IN_REVIEW, RESOLVED, ESCALATED_TO_EMERGENCY_SERVICES]

    PackageSize:
      type: string
      enum: [S, M, L]

    AdminDashboardResponse:
      type: object
      properties:
        totalPatients:
          type: integer
        totalProviders:
          type: integer
        activeProviders:
          type: integer
        totalBookings:
          type: integer
        activeBookings:
          type: integer
        bookingsToday:
          type: integer
        bookingsThisWeek:
          type: integer
        revenueToday:
          type: number
          format: float
        revenueThisWeek:
          type: number
          format: float
        revenueThisMonth:
          type: number
          format: float
        pendingVerifications:
          type: integer
        openEscalations:
          type: integer
        generatedAt:
          type: string
          format: date-time

    AdminProvider:
      type: object
      properties:
        id:
          type: integer
          format: int64
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        profession:
          type: string
        specialty:
          type: string
        status:
          $ref: '#/components/schemas/ProviderStatus'
        rating:
          type: number
          format: float
        createdAt:
          type: string
          format: date-time

    ProviderVerificationItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        profession:
          $ref: '#/components/schemas/ProviderProfession'
        specialty:
          $ref: '#/components/schemas/ProviderSpecialty'
        status:
          $ref: '#/components/schemas/ProviderStatus'
        documentUrls:
          type: array
          items:
            type: string
            format: uri
        createdAt:
          type: string
          format: date-time

    AdminStatusTimelineItem:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/BookingStatus'
        timestamp:
          type: string
          format: date-time
        note:
          type: string

    AdminBookingResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        patientId:
          type: integer
          format: int64
        providerId:
          type: integer
          format: int64
        serviceId:
          type: integer
          format: int64
        addressId:
          type: integer
          format: int64
        date:
          type: string
          format: date
        timeSlot:
          type: string
        status:
          $ref: '#/components/schemas/BookingStatus'
        paymentStatus:
          $ref: '#/components/schemas/PaymentStatus'
        paymentAmount:
          type: number
          format: float
        cancellationReason:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        timeline:
          type: array
          items:
            $ref: '#/components/schemas/AdminStatusTimelineItem'

    CreateServiceRequest:
      type: object
      required:
        - name
        - category
        - description
        - durationMinutes
        - price
      properties:
        name:
          type: string
        category:
          $ref: '#/components/schemas/ServiceCategory'
        description:
          type: string
        durationMinutes:
          type: integer
        price:
          type: number
          format: float
        imageUrl:
          type: string
          format: uri
        includedItems:
          type: array
          items:
            type: string
        requiredDocuments:
          type: array
          items:
            type: string

    UpdateServiceRequest:
      type: object
      properties:
        name:
          type: string
        category:
          $ref: '#/components/schemas/ServiceCategory'
        description:
          type: string
        durationMinutes:
          type: integer
        price:
          type: number
          format: float
        imageUrl:
          type: string
          format: uri
        includedItems:
          type: array
          items:
            type: string
        requiredDocuments:
          type: array
          items:
            type: string
        active:
          type: boolean

    CreatePackageRequest:
      type: object
      required:
        - name
        - size
        - description
        - serviceIds
        - price
        - discountPercent
        - validityDays
      properties:
        name:
          type: string
        size:
          $ref: '#/components/schemas/PackageSize'
        description:
          type: string
        serviceIds:
          type: array
          items:
            type: integer
            format: int64
        price:
          type: number
          format: float
        discountPercent:
          type: number
          format: float
        validityDays:
          type: integer
        benefits:
          type: array
          items:
            type: string

    PackageResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        serviceId:
          type: integer
          format: int64
        name:
          type: string
        size:
          $ref: '#/components/schemas/PackageSize'
        description:
          type: string
        price:
          type: number
          format: float
        discountPercent:
          type: number
          format: float
        validityDays:
          type: integer
        benefits:
          type: array
          items:
            type: string

    UpdateEscalationStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          $ref: '#/components/schemas/EscalationStatus'
        resolution:
          type: string
        actionTaken:
          type: string

    AdminEscalationResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        visitId:
          type: integer
          format: int64
        providerId:
          type: integer
          format: int64
        providerName:
          type: string
          nullable: true
        patientId:
          type: integer
          format: int64
        patientName:
          type: string
          nullable: true
        urgencyType:
          $ref: '#/components/schemas/UrgencyType'
        status:
          $ref: '#/components/schemas/EscalationStatus'
        description:
          type: string
        actionTaken:
          type: string
          nullable: true
        resolution:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        gpsLat:
          type: number
          format: double
          nullable: true
        gpsLng:
          type: number
          format: double
          nullable: true
        notifiedUsers:
          type: array
          items:
            type: string

    AdminPatientResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        phone:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        dateOfBirth:
          type: string
          format: date
        gender:
          type: string
        verified:
          type: boolean
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

# ─── Security ─────────────────────────────────────────────────────────────────

security:
  - BearerAuth: []

# ─── Paths ────────────────────────────────────────────────────────────────────

paths:

  # ── Health ──────────────────────────────────────────────────────────────────

  /health:
    get:
      summary: Health check endpoint
      security: []
